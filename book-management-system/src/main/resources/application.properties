server.port=8080
spring.application.name=book-management-system
spring.datasource.url=jdbc:h2:mem:librarydb;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Real LLM integration. Leave disabled for offline demo.
# For OpenAI: set LLM_ENABLED=true and LLM_API_KEY=your_key.
# For OpenAI-compatible providers, also set LLM_BASE_URL and LLM_MODEL.
llm.enabled=${LLM_ENABLED:false}
llm.api-key=${LLM_API_KEY:}
llm.base-url=${LLM_BASE_URL:https://api.openai.com/v1/chat/completions}
llm.model=${LLM_MODEL:gpt-4o-mini}
